spring.application.name=finexia

spring.datasource.url=jdbc:postgresql://localhost:5432/Finexia
spring.datasource.username=postgres
spring.datasource.password=60788228

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Ejecuta data.sql despues de que Hibernate crea/actualiza el esquema (ddl-auto=update no corre import.sql).
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# No envia el trace al usuario cuando hay error, pero si el mensaje (para poder diagnosticar 500s).
server.error.include-stacktrace=never
server.error.include-message=always

